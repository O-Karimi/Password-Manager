<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="ETF-8">
        <title>Register - Secure Vault</title>
    </head>
    <body>
        <h2>Create your Secure Vault</h2>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Register</button>
        </form>
        <p>Already have an account? <a href="{% url 'login' %}">Log in here</a>.</p>
    </body>
</html>
