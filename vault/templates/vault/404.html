{% extends "vault/base.html" %}

{% block title %}Page Not Found - Secure Vault{% endblock %}

{% block content %}
<div class="card text-center" style="max-width: 600px; margin: 80px auto; padding: 60px 20px;">
    <h1 style="font-size: 6rem; margin-bottom: 0; color: var(--primary);">404</h1>
    <h2 style="margin-top: 10px;">Vault Not Found</h2>
    <p class="text-muted mt-3" style="font-size: 1.1rem;">
        The page you are looking for doesn't exist, has been moved, or is locked securely away.
    </p>
    
    <div style="margin-top: 40px;">
        <a href="{% url 'home' %}" class="btn-primary" style="text-decoration: none; padding: 12px 30px; font-size: 1.1rem;">
            Return to Safety
        </a>
    </div>
</div>
{% endblock content %}
