{% extends "vault/base.html" %}

{% block title %}Login - Secure Vault{% endblock %}

{% block content %}
<div class="card form-card">
    <h2>Access your Vault</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-primary w-100">Log In</button>
    </form>
    <p class="text-center mt-3">Need an account? <a href="{% url 'register' %}">Register here</a>.</p>
</div>
{% endblock content %}
